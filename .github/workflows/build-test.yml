name: Build and Test

on:
  push:
    branches: [ main, master, develop, pcinstaller-mature-logic ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET Framework
      uses: microsoft/setup-msbuild@v1.1

    - name: Restore NuGet packages
      run: nuget restore GameVault.sln

    - name: Build solution
      run: msbuild GameVault.sln /p:Configuration=Release /p:Platform="Any CPU" /verbosity:minimal

    - name: Check build output
      run: |
        if (Test-Path "EmuLibrary/bin/Release/net462/EmuLibrary.dll") {
          Write-Host "Build successful - DLL created" -ForegroundColor Green
          Get-Item "EmuLibrary/bin/Release/net462/EmuLibrary.dll" | Select-Object Name, Length, LastWriteTime
        } else {
          Write-Host "Build failed - DLL not found" -ForegroundColor Red
          exit 1
        }
      shell: pwsh

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: GameVault-Plugin
        path: |
          EmuLibrary/bin/Release/net462/
          !EmuLibrary/bin/Release/net462/*.pdb
        retention-days: 30

  syntax-check-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Mono
      run: |
        sudo apt-get update
        sudo apt-get install -y mono-complete

    - name: Run basic syntax check
      run: |
        chmod +x syntax-check.sh
        ./syntax-check.sh
